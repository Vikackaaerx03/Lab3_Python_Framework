<!DOCTYPE html>
<html>
<head>
    <title>Create Order</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Create New Order</h2>

    <form method="post">
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <input name="order_number" placeholder="Order number (next: {{ expected_order_number }})" value="{{ form_data.get('order_number', expected_order_number) }}" required pattern="\d{3}" maxlength="3">
        <input name="customer_name" placeholder="Customer name" value="{{ form_data.get('customer_name', '') }}" required minlength="2" maxlength="100">
        <input name="total_price" placeholder="Total price" value="{{ form_data.get('total_price', '') }}" required type="number" min="0.01" step="0.01">
        <input name="order_date" type="date" value="{{ form_data.get('order_date', '') }}" required>

        <button type="submit">Save</button>
    </form>

    <a href="/" class="back">Back</a>
</div>

</body>
</html>
