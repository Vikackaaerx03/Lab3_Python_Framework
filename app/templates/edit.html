<!DOCTYPE html>
<html>
<head>
    <title>Edit Order</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Edit Order</h2>

    <form method="post">
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <input name="order_number" value="{{ order.order_number }}" required pattern="\d{3}" maxlength="3">
        <input name="customer_name" value="{{ order.customer_name }}" required minlength="2" maxlength="100">
        <input name="total_price" value="{{ order.total_price }}" required type="number" min="0.01" step="0.01">
        <input name="order_date" type="date" value="{{ order.order_date }}" required>

        <button type="submit">Update</button>
    </form>

    <a href="/" class="back">Back</a>
</div>

</body>
</html>
